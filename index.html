<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云旗 & 郝熠然 — 行程地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        :root {
            --orange: #F57C00;
            --red: #E53935;
            --cyan: #00ACC1;
            --bg: #F5F7FA;
            --bg-white: #FFFFFF;
            --bg-card: #FFFFFF;
            --bg-card-hover: #FAFBFC;
            --text: #1A202C;
            --text-secondary: #4A5568;
            --text-muted: #A0AEC0;
            --accent: #3182CE;
            --accent-light: #EBF4FF;
            --border: #E2E8F0;
            --shadow: rgba(0,0,0,0.08);
            --shadow-md: rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        /* ===== Top Navigation ===== */
        .topbar {
            height: 56px;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: relative;
            z-index: 1000;
            box-shadow: 0 1px 3px var(--shadow);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--cyan), var(--orange));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: white; font-weight: 700;
            box-shadow: 0 2px 8px rgba(0,188,193,0.3);
        }

        .topbar-title {
            font-size: 18px; font-weight: 700;
            color: var(--text);
        }

        .topbar-right {
            display: flex; align-items: center; gap: 16px;
        }

        .legend {
            display: flex; gap: 16px; font-size: 13px; color: var(--text-secondary);
        }

        .legend-item {
            display: flex; align-items: center; gap: 6px;
        }

        .legend-dot {
            width: 10px; height: 10px; border-radius: 50%;
        }

        .btn {
            padding: 8px 16px; border-radius: 8px; border: none;
            font-family: inherit; font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }

        .btn-primary {
            background: var(--accent); color: white;
            box-shadow: 0 2px 6px rgba(49,130,206,0.3);
        }
        .btn-primary:hover { background: #2B6CB0; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(49,130,206,0.4); }

        .btn-outline {
            background: transparent; color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

        .btn-danger {
            background: #FED7D7; color: #E53E3E; border: 1px solid #FEB2B2;
        }
        .btn-danger:hover { background: #FEB2B2; }

        .btn-admin {
            background: linear-gradient(135deg, #F57C00, #EF6C00);
            color: white; font-weight: 600;
            box-shadow: 0 2px 6px rgba(245,124,0,0.3);
        }

        /* ===== Main Layout ===== */
        .main {
            display: flex;
            height: calc(100vh - 56px);
        }

        /* ===== Map ===== */
        #map {
            flex: 1;
            z-index: 1;
        }

        .leaflet-popup-content-wrapper {
            background: var(--bg-white) !important;
            color: var(--text) !important;
            border-radius: 12px !important;
            box-shadow: 0 4px 24px var(--shadow-md) !important;
            border: 1px solid var(--border) !important;
        }
        .leaflet-popup-tip { background: var(--bg-white) !important; border: 1px solid var(--border) !important; border-top: none !important; border-left: none !important; }
        .leaflet-popup-content { margin: 12px 16px !important; line-height: 1.5 !important; }

        .popup-title {
            font-size: 15px; font-weight: 700; margin-bottom: 4px; color: var(--text);
        }
        .popup-date { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
        .popup-persons { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
        .popup-badge {
            font-size: 11px; padding: 2px 8px; border-radius: 10px;
            font-weight: 500;
        }

        .popup-images {
            display: flex; gap: 6px; overflow-x: auto; padding: 4px 0;
            margin-bottom: 8px;
        }
        .popup-images img {
            width: 60px; height: 60px; border-radius: 8px; object-fit: cover;
            border: 1px solid var(--border);
        }

        .popup-actions { display: flex; gap: 6px; flex-wrap: wrap; }

        .popup-btn {
            font-size: 11px; padding: 4px 10px; border-radius: 6px;
            border: 1px solid var(--border); background: var(--bg-white);
            color: var(--text-secondary); cursor: pointer; font-family: inherit;
            transition: all 0.2s;
        }
        .popup-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 380px;
            background: var(--bg-white);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 500;
            transition: transform 0.3s;
            box-shadow: -2px 0 8px var(--shadow);
        }

        .sidebar.collapsed {
            transform: translateX(100%);
            position: absolute;
            right: 0; top: 56px; bottom: 0;
        }

        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }

        .sidebar-header h3 {
            font-size: 16px; font-weight: 700; color: var(--text);
        }

        .filter-tabs {
            display: flex; gap: 4px; padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .filter-tab {
            padding: 6px 14px; border-radius: 20px; font-size: 12px;
            border: 1px solid transparent; background: transparent;
            color: var(--text-muted); cursor: pointer; font-family: inherit;
            transition: all 0.2s; font-weight: 500;
        }
        .filter-tab.active {
            background: var(--accent); color: white;
            box-shadow: 0 2px 6px rgba(49,130,206,0.3);
        }
        .filter-tab:hover:not(.active) { color: var(--text-secondary); background: #EDF2F7; }

        .trip-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .trip-list::-webkit-scrollbar { width: 4px; }
        .trip-list::-webkit-scrollbar-track { background: transparent; }
        .trip-list::-webkit-scrollbar-thumb { background: #CBD5E0; border-radius: 4px; }

        .trip-card {
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .trip-card::before {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0;
            width: 3px;
        }

        .trip-card.type-yunqi::before { background: var(--orange); }
        .trip-card.type-haoyiran::before { background: var(--red); }
        .trip-card.type-both::before { background: var(--cyan); }

        .trip-card:hover {
            box-shadow: 0 4px 12px var(--shadow-md);
            transform: translateY(-1px);
        }

        .trip-card.active {
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(49,130,206,0.15);
        }

        .trip-card-top {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 8px;
        }

        .trip-route {
            font-size: 14px; font-weight: 600; color: var(--text);
        }

        .trip-type-badge {
            font-size: 10px; padding: 2px 8px; border-radius: 10px;
            font-weight: 600;
        }

        .trip-meta {
            display: flex; gap: 12px; font-size: 12px; color: var(--text-muted);
            margin-bottom: 8px;
        }

        .trip-meta i { margin-right: 4px; }

        .trip-desc {
            font-size: 12px; color: var(--text-muted); line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }

        .trip-card-actions {
            display: flex; gap: 4px; margin-top: 10px; justify-content: flex-end;
        }

        .trip-card-btn {
            font-size: 11px; padding: 3px 8px; border-radius: 5px;
            border: 1px solid var(--border); background: var(--bg-white);
            color: var(--text-muted); cursor: pointer; font-family: inherit;
        }
        .trip-card-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ===== Modal ===== */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center;
            z-index: 2000;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .modal-header {
            padding: 20px 24px 0;
            display: flex; justify-content: space-between; align-items: center;
        }

        .modal-header h3 { font-size: 18px; font-weight: 700; color: var(--text); }

        .modal-close {
            width: 32px; height: 32px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--bg-white);
            color: var(--text-muted); cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .modal-close:hover { border-color: #E53E3E; color: #E53E3E; background: #FFF5F5; }

        .modal-body { padding: 20px 24px 24px; }

        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block; font-size: 13px; font-weight: 500;
            margin-bottom: 6px; color: var(--text-secondary);
        }

        .form-input, .form-select, .form-textarea {
            width: 100%; padding: 10px 14px; border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text); font-family: inherit; font-size: 14px;
            transition: all 0.2s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(49,130,206,0.1);
        }
        .form-input::placeholder { color: var(--text-muted); }
        .form-textarea { min-height: 80px; resize: vertical; }
        .form-select option { background: var(--bg-white); }

        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }

        .person-checkboxes { display: flex; gap: 12px; }

        .person-checkbox {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 8px;
            border: 1px solid var(--border); cursor: pointer;
            transition: all 0.2s; font-size: 13px; background: var(--bg-white);
        }
        .person-checkbox input { display: none; }
        .person-checkbox.yunqi.checked { border-color: var(--orange); background: #FFF3E0; color: var(--orange); }
        .person-checkbox.haoyiran.checked { border-color: var(--red); background: #FFEBEE; color: var(--red); }

        .image-upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg);
        }
        .image-upload-area:hover { border-color: var(--accent); background: var(--accent-light); }
        .image-upload-area i { font-size: 24px; color: var(--text-muted); margin-bottom: 8px; }
        .image-upload-area p { font-size: 13px; color: var(--text-muted); }

        .uploaded-images {
            display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;
        }
        .uploaded-images img {
            width: 60px; height: 60px; border-radius: 8px; object-fit: cover;
            border: 1px solid var(--border);
        }

        /* ===== Login Modal ===== */
        .login-options {
            display: flex; gap: 12px; margin-top: 12px;
        }
        .login-option {
            flex: 1; padding: 20px; border-radius: 12px;
            border: 2px solid var(--border); cursor: pointer;
            text-align: center; transition: all 0.2s; background: var(--bg);
        }
        .login-option:hover { border-color: var(--accent); background: var(--accent-light); }
        .login-option i { font-size: 28px; margin-bottom: 10px; display: block; }
        .login-option .label { font-size: 15px; font-weight: 600; color: var(--text); }
        .login-option .desc { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        /* ===== Toast ===== */
        .toast-container {
            position: fixed; top: 72px; right: 24px; z-index: 3000;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            padding: 12px 20px; border-radius: 10px;
            background: var(--bg-white); border: 1px solid var(--border);
            box-shadow: 0 8px 24px var(--shadow-md);
            font-size: 13px; animation: slideIn 0.3s ease;
            display: flex; align-items: center; gap: 8px;
        }
        .toast.success { border-color: #9AE6B4; }
        .toast.success i { color: #38A169; }
        .toast.error { border-color: #FEB2B2; }
        .toast.error i { color: #E53E3E; }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .sidebar { width: 320px; position: absolute; right: 0; top: 56px; bottom: 0; }
            .sidebar:not(.collapsed) { transform: translateX(0); }
            .legend { display: none; }
            .modal { width: 95vw; }
        }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="topbar">
        <div class="topbar-left">
            <div class="topbar-logo"><i class="fas fa-route"></i></div>
            <span class="topbar-title">云旗 & 郝熠然 · 行程地图</span>
        </div>
        <div class="topbar-right">
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-dot" style="background: var(--orange);"></div>
                    <span>云旗</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: var(--red);"></div>
                    <span>郝熠然</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: var(--cyan);"></div>
                    <span>双人</span>
                </div>
            </div>
            <button class="btn btn-outline" onclick="toggleSidebar()">
                <i class="fas fa-list"></i> 行程列表
            </button>
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <div id="map"></div>
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-map-marker-alt" style="color:var(--accent);margin-right:8px;"></i>行程列表</h3>
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active" onclick="filterTrips('all', this)">全部</button>
                <button class="filter-tab" onclick="filterTrips('yunqi', this)">云旗</button>
                <button class="filter-tab" onclick="filterTrips('haoyiran', this)">郝熠然</button>
                <button class="filter-tab" onclick="filterTrips('both', this)">双人</button>
            </div>
            <div class="trip-list" id="tripList"></div>
        </div>
    </div>

    <!-- Trip Detail Modal -->
    <div class="modal-overlay" id="tripDetailModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="detailTitle">行程详情</h3>
                <button class="modal-close" onclick="closeModal('tripDetailModal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="detailBody"></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    // ===== State =====
    let currentFilter = 'all';
    let map, routeLayers = [], markerLayers = [];

    // ===== Preset Trip Data =====
    const trips = [
        {
            id: 1,
            from: '成都',
            to: '曼谷',
            fromCoord: [30.5728, 104.0668],
            toCoord: [13.6900, 100.7501],
            date: '2026-04-24',
            transport: 'flight',
            persons: ['yunqi', 'haoyiran'],
            desc: '两人从成都出发，飞往曼谷开启泰国之旅'
        },
        {
            id: 2,
            from: '曼谷 (素万那普机场)',
            to: '北京 (大兴机场)',
            fromCoord: [13.6900, 100.7501],
            toCoord: [39.5098, 116.4105],
            date: '2026-04-27',
            transport: 'flight',
            persons: ['haoyiran'],
            desc: '郝熠然从曼谷飞回北京'
        },
        {
            id: 3,
            from: '曼谷 (素万那普机场)',
            to: '上海',
            fromCoord: [13.6900, 100.7501],
            toCoord: [31.2304, 121.4737],
            date: '2026-04-27',
            transport: 'flight',
            persons: ['yunqi'],
            desc: '云旗从曼谷飞往上海'
        }
    ];

    // ===== Map Initialization =====
    function initMap() {
        map = L.map('map', {
            center: [25, 100],
            zoom: 4,
            zoomControl: false
        });

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        renderAllRoutes();
    }

    // ===== Get trip type =====
    function getTripType(trip) {
        if (trip.persons.includes('yunqi') && trip.persons.includes('haoyiran')) return 'both';
        if (trip.persons.includes('yunqi')) return 'yunqi';
        if (trip.persons.includes('haoyiran')) return 'haoyiran';
        return 'both';
    }

    function getTripColor(trip) {
        const type = getTripType(trip);
        switch(type) {
            case 'yunqi': return '#F57C00';
            case 'haoyiran': return '#E53935';
            case 'both': return '#00ACC1';
        }
    }

    function getTypeName(type) {
        switch(type) {
            case 'yunqi': return '云旗';
            case 'haoyiran': return '郝熠然';
            case 'both': return '双人';
        }
    }

    function getTransportIcon(t) {
        switch(t) {
            case 'flight': return '✈️';
            case 'train': return '🚄';
            case 'car': return '🚗';
            case 'bus': return '🚌';
            case 'walk': return '🚶';
            default: return '🔗';
        }
    }

    // ===== Render Routes =====
    function renderAllRoutes() {
        routeLayers.forEach(l => map.removeLayer(l));
        markerLayers.forEach(l => map.removeLayer(l));
        routeLayers = [];
        markerLayers = [];

        const filtered = currentFilter === 'all' ? trips : trips.filter(t => getTripType(t) === currentFilter);

        filtered.forEach(trip => {
            const color = getTripColor(trip);

            const line = drawCurvedLine(trip.fromCoord, trip.toCoord, color);
            if (line) routeLayers.push(line);

            const fromIcon = createMarkerIcon(trip.from.charAt(0), color, false);
            const fromMarker = L.marker(trip.fromCoord, { icon: fromIcon }).addTo(map);
            fromMarker.bindPopup(createPopupContent(trip, 'from'));
            markerLayers.push(fromMarker);

            const toIcon = createMarkerIcon(trip.to.charAt(0), color, true);
            const toMarker = L.marker(trip.toCoord, { icon: toIcon }).addTo(map);
            toMarker.bindPopup(createPopupContent(trip, 'to'));
            markerLayers.push(toMarker);
        });
    }

    function drawCurvedLine(from, to, color) {
        const points = [];
        const steps = 50;
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const lat = from[0] + (to[0] - from[0]) * t;
            const lng = from[1] + (to[1] - from[1]) * t;
            const dist = Math.sqrt(Math.pow(to[0] - from[0], 2) + Math.pow(to[1] - from[1], 2));
            const arcHeight = dist * 0.15;
            const latOffset = Math.sin(t * Math.PI) * arcHeight;
            points.push([lat + latOffset, lng]);
        }
        const line = L.polyline(points, {
            color: color,
            weight: 2.5,
            opacity: 0.8,
            dashArray: '8, 6'
        }).addTo(map);
        return line;
    }

    function createMarkerIcon(letter, color, isDestination) {
        const size = isDestination ? 30 : 24;
        const fontSize = isDestination ? 14 : 11;
        return L.divIcon({
            className: 'custom-marker',
            html: `<div style="
                width:${size}px;height:${size}px;border-radius:50%;
                background:${color};border:3px solid white;
                display:flex;align-items:center;justify-content:center;
                font-size:${fontSize}px;font-weight:700;color:white;
                box-shadow:0 2px 8px rgba(0,0,0,0.2);
                font-family:'Noto Sans SC',sans-serif;
            ">${letter}</div>`,
            iconSize: [size, size],
            iconAnchor: [size/2, size/2],
            popupAnchor: [0, -size/2]
        });
    }

    // ===== Popup Content =====
    function createPopupContent(trip, side) {
        const color = getTripColor(trip);
        const label = side === 'from' ? '出发' : '到达';

        let personBadges = '';
        if (trip.persons.includes('yunqi') && trip.persons.includes('haoyiran')) {
            personBadges = '<span class="popup-badge" style="background:#E0F7FA;color:#00ACC1;">🤝 双人行程</span>';
        } else {
            trip.persons.forEach(p => {
                const c = p === 'yunqi' ? '#F57C00' : '#E53935';
                const n = p === 'yunqi' ? '云旗' : '郝熠然';
                personBadges += `<span class="popup-badge" style="background:${c}15;color:${c};">${n}</span>`;
            });
        }

        return `
            <div class="popup-title">${side === 'from' ? trip.from : trip.to} <span style="color:${color};font-size:12px;">（${label}）</span></div>
            <div class="popup-date">${getTransportIcon(trip.transport)} ${trip.date} · ${trip.from} → ${trip.to}</div>
            <div class="popup-persons">${personBadges}</div>
            <p style="font-size:12px;color:#718096;margin-top:4px;">${trip.desc || ''}</p>
            <div class="popup-actions" style="margin-top:8px;">
                <button class="popup-btn" onclick="showTripDetail(${trip.id})"><i class="fas fa-expand"></i> 详情与评论</button>
            </div>
        `;
    }

    // ===== Trip List Rendering =====
    function renderTripList() {
        const container = document.getElementById('tripList');
        const filtered = currentFilter === 'all' ? trips : trips.filter(t => getTripType(t) === currentFilter);

        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px;"><i class="fas fa-inbox" style="font-size:32px;display:block;margin-bottom:12px;"></i>暂无行程数据</div>';
            return;
        }

        container.innerHTML = filtered.map(trip => {
            const type = getTripType(trip);
            const color = getTripColor(trip);
            const typeName = getTypeName(type);

            return `
                <div class="trip-card type-${type}" onclick="flyToTrip(${trip.id})">
                    <div class="trip-card-top">
                        <div class="trip-route">${getTransportIcon(trip.transport)} ${trip.from} → ${trip.to}</div>
                        <span class="trip-type-badge" style="background:${color}15;color:${color};">${typeName}</span>
                    </div>
                    <div class="trip-meta">
                        <span><i class="fas fa-calendar-alt"></i>${trip.date}</span>
                    </div>
                    <div class="trip-desc">${trip.desc || '暂无备注'}</div>
                    <div class="trip-card-actions">
                        <button class="trip-card-btn" onclick="event.stopPropagation();showTripDetail(${trip.id})"><i class="fas fa-eye"></i> 详情</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function filterTrips(type, btn) {
        currentFilter = type;
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        renderTripList();
        renderAllRoutes();
    }

    function flyToTrip(id) {
        const trip = trips.find(t => t.id === id);
        if (!trip) return;
        const bounds = L.latLngBounds([trip.fromCoord, trip.toCoord]);
        map.flyToBounds(bounds.pad(0.3), { duration: 1.2 });
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    }

    // ===== Trip Detail Modal =====
    function showTripDetail(id) {
        const trip = trips.find(t => t.id === id);
        if (!trip) return;

        const color = getTripColor(trip);
        const type = getTripType(trip);

        let personBadges = '';
        if (trip.persons.includes('yunqi') && trip.persons.includes('haoyiran')) {
            personBadges = '<span class="popup-badge" style="background:#E0F7FA;color:#00ACC1;font-size:13px;padding:4px 12px;">🤝 双人行程</span>';
        } else {
            trip.persons.forEach(p => {
                const c = p === 'yunqi' ? '#F57C00' : '#E53935';
                const n = p === 'yunqi' ? '云旗' : '郝熠然';
                personBadges += `<span class="popup-badge" style="background:${c}15;color:${c};font-size:13px;padding:4px 12px;">${n}</span>`;
            });
        }

        document.getElementById('detailTitle').innerHTML = `${getTransportIcon(trip.transport)} ${trip.from} → ${trip.to}`;
        document.getElementById('detailBody').innerHTML = `
            <div style="margin-bottom:16px;">
                ${personBadges}
                <span style="margin-left:8px;font-size:13px;color:var(--text-muted);"><i class="fas fa-calendar-alt"></i> ${trip.date}</span>
            </div>
            <p style="font-size:14px;line-height:1.6;color:var(--text-secondary);margin-bottom:20px;">${trip.desc || '暂无备注'}</p>
            <div style="padding-top:16px;border-top:1px solid var(--border);">
                <h4 style="font-size:14px;margin-bottom:12px;color:var(--text);"><i class="fas fa-comments" style="color:var(--accent);margin-right:6px;"></i>留言板</h4>
                <div class="giscus-wrapper" data-giscus-path="trip-${trip.id}"></div>
            </div>
        `;

        openModal('tripDetailModal');

        // Render giscus in modal
        setTimeout(() => {
            renderGiscus(`trip-${trip.id}`);
        }, 100);
    }

    // ===== Giscus Comment System =====
    let currentGiscusContainer = null;

    function renderGiscus(term) {
        // Remove old giscus if exists
        const old = document.querySelector('.giscus-wrapper iframe');
        if (old) old.remove();
        const oldScript = document.querySelector('.giscus-wrapper script');
        if (oldScript) oldScript.remove();

        const wrapper = document.querySelector('.giscus-wrapper');
        if (!wrapper) return;

        const script = document.createElement('script');
        script.src = 'https://giscus.app/client.js';
        script.setAttribute('data-repo', 'penapinner/yunyi-map');
        script.setAttribute('data-repo-id', 'R_kgDOSN4YPg');
        script.setAttribute('data-category', 'Announcements');
        script.setAttribute('data-category-id', 'DIC_kwDOSN4YPs4C7zBF');
        script.setAttribute('data-mapping', 'specific');
        script.setAttribute('data-term', term);
        script.setAttribute('data-strict', '0');
        script.setAttribute('data-reactions-enabled', '1');
        script.setAttribute('data-emit-metadata', '0');
        script.setAttribute('data-input-position', 'top');
        script.setAttribute('data-theme', 'light');
        script.setAttribute('data-lang', 'zh-CN');
        script.setAttribute('crossorigin', 'anonymous');
        script.async = true;
        wrapper.appendChild(script);
    }

    // ===== Modal Helpers =====
    function openModal(id) {
        document.getElementById(id).classList.add('active');
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('active');
    }

    // ===== Close modals on overlay click =====
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                overlay.classList.remove('active');
            }
        });
    });

    // ===== Init =====
    initMap();
    renderTripList();

    // Fly to show all initial trips
    setTimeout(() => {
        const allCoords = trips.flatMap(t => [t.fromCoord, t.toCoord]);
        if (allCoords.length > 0) {
            const bounds = L.latLngBounds(allCoords);
            map.flyToBounds(bounds.pad(0.2), { duration: 1.5 });
        }
    }, 500);
    </script>
</body>
</html>
