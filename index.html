<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云旗 & 郝熠然 — 值得一路同行</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        :root {
            --orange: #F57C00;
            --red: #E53935;
            --cyan: #00ACC1;
            --bg: #F5F7FA;
            --bg-white: #FFFFFF;
            --bg-card: #FFFFFF;
            --text: #1A202C;
            --text-secondary: #4A5568;
            --text-muted: #A0AEC0;
            --accent: #3182CE;
            --accent-light: #EBF4FF;
            --border: #E2E8F0;
            --shadow: rgba(0,0,0,0.08);
            --shadow-md: rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== Top Navigation ===== */
        .topbar {
            height: 56px; background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; position: relative; z-index: 1000;
            box-shadow: 0 1px 3px var(--shadow); flex-shrink: 0;
        }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .topbar-logo {
            width: 36px; height: 36px;
            border-radius: 10px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,188,193,0.3);
            flex-shrink: 0;
        }
        .topbar-logo img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .topbar-title { font-size: 18px; font-weight: 700; color: var(--text); }
        .topbar-right { display: flex; align-items: center; gap: 16px; }
        .legend { display: flex; gap: 16px; font-size: 13px; color: var(--text-secondary); }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .btn {
            padding: 8px 16px; border-radius: 8px; border: none;
            font-family: inherit; font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-outline { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
        .btn-outline.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

        /* ===== Main Layout ===== */
        .main { display: flex; flex: 1; min-height: 0; }

        /* ===== Map Column (map + slider + stats, not under sidebar) ===== */
        .map-column {
            flex: 1; display: flex; flex-direction: column; min-width: 0;
            position: relative; z-index: 1;
        }
        #map { flex: 1; z-index: 1; }
        .leaflet-popup-content-wrapper {
            background: var(--bg-white) !important; color: var(--text) !important;
            border-radius: 12px !important; box-shadow: 0 4px 24px var(--shadow-md) !important;
            border: 1px solid var(--border) !important; max-width: 320px !important;
        }
        .leaflet-popup-tip { background: var(--bg-white) !important; border: 1px solid var(--border) !important; border-top: none !important; border-left: none !important; }
        .leaflet-popup-content { margin: 12px 16px !important; line-height: 1.5 !important; }
        .popup-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
        .popup-date { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
        .popup-desc { font-size: 12px; color: #718096; margin-top: 4px; }
        .popup-persons { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
        .popup-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
        .popup-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
        .popup-btn {
            font-size: 11px; padding: 4px 10px; border-radius: 6px;
            border: 1px solid var(--border); background: var(--bg-white);
            color: var(--text-secondary); cursor: pointer; font-family: inherit; transition: all 0.2s;
        }
        .popup-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
        .popup-link { font-size: 11px; color: var(--accent); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
        .popup-link:hover { text-decoration: underline; }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 400px; background: var(--bg-white);
            border-left: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 500;
            transition: transform 0.3s, width 0.3s; box-shadow: -2px 0 8px var(--shadow);
            flex-shrink: 0; overflow: hidden;
        }
        .sidebar.collapsed { width: 0; overflow: hidden; border-left: none; box-shadow: none; }
        .sidebar-header {
            padding: 16px 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .sidebar-header h3 { font-size: 16px; font-weight: 700; color: var(--text); white-space: nowrap; }
        .sidebar-view-toggle { display: flex; gap: 2px; background: var(--bg); border-radius: 8px; padding: 2px; }
        .sidebar-view-btn {
            padding: 5px 10px; border-radius: 6px; border: none;
            font-family: inherit; font-size: 11px; font-weight: 500;
            color: var(--text-muted); background: transparent; cursor: pointer; transition: all 0.2s;
            white-space: nowrap;
        }
        .sidebar-view-btn.active { background: var(--bg-white); color: var(--accent); box-shadow: 0 1px 3px var(--shadow); }

        /* ===== Filter Tabs ===== */
        .filter-tabs {
            display: flex; gap: 4px; padding: 12px 20px;
            border-bottom: 1px solid var(--border); background: var(--bg);
        }
        #listView, #calendarView, #checkinView { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
        #calendarView { display: none; }
        .filter-tab {
            padding: 6px 14px; border-radius: 20px; font-size: 12px;
            border: 1px solid transparent; background: transparent;
            color: var(--text-muted); cursor: pointer; font-family: inherit; transition: all 0.2s; font-weight: 500;
        }
        .filter-tab.active { background: var(--accent); color: white; box-shadow: 0 2px 6px rgba(49,130,206,0.3); }
        .filter-tab:hover:not(.active) { color: var(--text-secondary); background: #EDF2F7; }

        /* ===== Trip List ===== */
        .trip-list { flex: 1; overflow-y: auto; padding: 12px; }
        .trip-list::-webkit-scrollbar { width: 4px; }
        .trip-list::-webkit-scrollbar-thumb { background: #CBD5E0; border-radius: 4px; }
        .trip-card {
            background: var(--bg-white); border: 1px solid var(--border); border-radius: 10px;
            padding: 10px 12px; margin-bottom: 6px; cursor: pointer; transition: all 0.2s;
            position: relative; overflow: hidden;
        }
        .trip-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
        .trip-card.type-yunqi::before { background: var(--orange); }
        .trip-card.type-haoyiran::before { background: var(--red); }
        .trip-card.type-both::before { background: var(--cyan); }
        .trip-card:hover { box-shadow: 0 4px 12px var(--shadow-md); transform: translateY(-1px); }
        .trip-card.active { border-color: var(--accent); box-shadow: 0 4px 12px rgba(49,130,206,0.15); }
        .trip-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3px; }
        .trip-route { font-size: 13px; font-weight: 600; color: var(--text); }
        .trip-type-badge { font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 600; }
        .trip-meta { display: flex; gap: 10px; font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
        .trip-meta i { margin-right: 3px; }
        .trip-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .trip-card-actions { display: flex; gap: 4px; margin-top: 4px; justify-content: flex-end; }
        .trip-card-btn {
            font-size: 11px; padding: 3px 8px; border-radius: 5px;
            border: 1px solid var(--border); background: var(--bg-white);
            color: var(--text-muted); cursor: pointer; font-family: inherit;
        }
        .trip-card-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ===== Calendar ===== */
        .calendar-container { flex: 1; overflow-y: auto; padding: 16px; }
        .calendar-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .calendar-nav-btn {
            width: 32px; height: 32px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--bg-white);
            color: var(--text-secondary); cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 13px;
        }
        .calendar-nav-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
        .calendar-month-label { font-size: 16px; font-weight: 700; color: var(--text); }
        .calendar-today-btn {
            padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
            background: var(--bg-white); color: var(--text-muted); font-size: 12px; cursor: pointer; font-family: inherit;
        }
        .calendar-today-btn:hover { border-color: var(--accent); color: var(--accent); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .calendar-weekday { text-align: center; font-size: 11px; font-weight: 600; color: var(--text-muted); padding: 8px 0; }
        .calendar-day {
            aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 10px; cursor: pointer; transition: all 0.15s; position: relative;
            font-size: 13px; color: var(--text-secondary); min-height: 42px;
        }
        .calendar-day:hover { background: var(--accent-light); color: var(--accent); }
        .calendar-day.other-month { color: #CBD5E0; }
        .calendar-day.other-month:hover { color: #A0AEC0; background: #F7FAFC; }
        .calendar-day.today { font-weight: 700; color: var(--accent); background: var(--accent-light); }
        .calendar-day.has-trips { background: #FAFBFC; }
        .calendar-day.selected { background: var(--accent) !important; color: white !important; box-shadow: 0 2px 8px rgba(49,130,206,0.4); }
        .calendar-day.selected .trip-dots .trip-dot { box-shadow: 0 0 0 1.5px white; }
        .calendar-day.out-of-range { color: #D0D5DD; opacity: 0.4; }
        .trip-dots { display: flex; gap: 2px; margin-top: 2px; position: absolute; bottom: 4px; }
        .trip-dot { width: 5px; height: 5px; border-radius: 50%; }
        .calendar-lunar { font-size: 9px; color: var(--text-muted); line-height: 1; margin-top: 1px; position: absolute; top: 3px; }
        .calendar-day.today .calendar-lunar { color: var(--accent); }
        .calendar-day.selected .calendar-lunar { color: rgba(255,255,255,0.8); }
        .calendar-day.other-month .calendar-lunar { color: #E2E8F0; }
        .calendar-day.out-of-range .calendar-lunar { color: #D0D5DD; }
        .calendar-trip-detail { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
        .calendar-trip-detail-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; }
        .calendar-trip-item {
            display: flex; align-items: flex-start; gap: 10px; padding: 10px;
            border-radius: 8px; border: 1px solid var(--border); margin-bottom: 8px;
            cursor: pointer; transition: all 0.2s;
        }
        .calendar-trip-item:hover { border-color: var(--accent); background: var(--accent-light); }
        .calendar-trip-item-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
        .calendar-trip-item-route { font-size: 13px; font-weight: 600; color: var(--text); }
        .calendar-trip-item-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        /* ===== Modal ===== */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-white); border: 1px solid var(--border); border-radius: 16px;
            width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .modal-header { padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 18px; font-weight: 700; color: var(--text); }
        .modal-close {
            width: 32px; height: 32px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--bg-white);
            color: var(--text-muted); cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .modal-close:hover { border-color: #E53E3E; color: #E53E3E; background: #FFF5F5; }
        .modal-body { padding: 20px 24px 24px; }

        /* ===== Toast ===== */
        .toast-container { position: fixed; top: 72px; right: 24px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
        .toast {
            padding: 12px 20px; border-radius: 10px; background: var(--bg-white);
            border: 1px solid var(--border); box-shadow: 0 8px 24px var(--shadow-md);
            font-size: 13px; animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 8px;
        }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* ===== Stats Bar ===== */
        .stats-bar {
            padding: 8px 20px; background: var(--bg); border-bottom: 1px solid var(--border);
            display: flex; gap: 16px; font-size: 11px; color: var(--text-muted);
        }
        .stat-item i { margin-right: 4px; }

        /* ===== Time Slider Bar (inside map-column) ===== */
        .time-slider-bar {
            background: var(--bg-white); border-top: 1px solid var(--border);
            padding: 10px 24px; display: flex; align-items: center; gap: 16px;
            flex-shrink: 0; z-index: 500;
        }
        .time-slider-label {
            font-size: 12px; font-weight: 600; color: var(--text-secondary);
            white-space: nowrap; display: flex; align-items: center; gap: 6px;
        }
        .time-slider-label i { color: var(--accent); }
        .time-slider-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .time-slider-range { display: flex; align-items: center; gap: 8px; }
        .time-range-display {
            font-size: 11px; color: var(--accent); font-weight: 600;
            background: var(--accent-light); padding: 3px 10px; border-radius: 6px;
            white-space: nowrap;
        }
        input[type="range"] {
            -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
            border-radius: 3px; background: var(--border); outline: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 20px; height: 20px;
            border-radius: 50%; background: var(--accent); border: 3px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2); cursor: grab; transition: transform 0.15s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
        input[type="range"]::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.25); }
        input[type="range"]::-moz-range-thumb {
            width: 20px; height: 20px; border-radius: 50%; background: var(--accent);
            border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.2); cursor: grab;
        }
        .time-slider-ticks {
            display: flex; justify-content: space-between;
            font-size: 10px; color: var(--text-muted); padding: 0 2px;
        }

        /* ===== Stats Panel (inside map-column, below slider) ===== */
        .stats-panel {
            background: var(--bg-white); border-top: 1px solid var(--border);
            box-shadow: 0 -2px 12px var(--shadow); flex-shrink: 0;
            display: flex; flex-direction: column;
            max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .stats-panel.open { max-height: 400px; }
        .stats-panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 24px; border-bottom: 1px solid var(--border);
            background: var(--bg); flex-shrink: 0;
        }
        .stats-panel-header h3 {
            font-size: 14px; font-weight: 700; color: var(--text);
            display: flex; align-items: center; gap: 8px;
        }
        .stats-panel-header h3 i { color: var(--accent); }
        .stats-close-btn {
            width: 28px; height: 28px; border-radius: 6px;
            border: 1px solid var(--border); background: var(--bg-white);
            color: var(--text-muted); cursor: pointer; font-size: 14px;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .stats-close-btn:hover { border-color: #E53E3E; color: #E53E3E; }
        .stats-charts {
            flex: 1; overflow-x: auto; overflow-y: hidden;
            display: flex; gap: 20px; padding: 20px 24px;
            min-height: 280px;
        }
        .stats-charts::-webkit-scrollbar { height: 6px; }
        .stats-charts::-webkit-scrollbar-thumb { background: #CBD5E0; border-radius: 3px; }
        .chart-card {
            min-width: 280px; max-width: 340px; flex: 1;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px;
            display: flex; flex-direction: column;
        }
        .chart-card-title {
            font-size: 13px; font-weight: 600; color: var(--text);
            margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
        }
        .chart-card-title i { color: var(--accent); font-size: 12px; }
        .chart-container { flex: 1; min-height: 220px; }

        /* ===== Checkin Categories ===== */
        :root {
            --cat-love: #00ACC1;
            --cat-h52: #FF5722;
            --cat-biz: #9C27B0;
            --cat-support: #FF69B4;
            --cat-shop: #4CAF50;
        }
        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px 16px;
        }
        .category-tab {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg-white);
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .category-tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .cat-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .cat-love { background: var(--cat-love); }
        .cat-h52 { background: var(--cat-h52); }
        .cat-biz { background: var(--cat-biz); }
        .cat-support { background: var(--cat-support); }
        .cat-shop { background: var(--cat-shop); }

        .checkin-stats {
            padding: 0 16px 8px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .checkin-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
        }
        .checkin-card {
            background: var(--bg-white);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 8px;
            box-shadow: 0 1px 3px var(--shadow);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .checkin-card:active {
            transform: scale(0.98);
        }
        .checkin-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .checkin-card-tag {
            font-size: 10px;
            padding: 1px 7px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
        }
        .tag-love { background: var(--cat-love); }
        .tag-h52 { background: var(--cat-h52); }
        .tag-biz { background: var(--cat-biz); }
        .tag-support { background: var(--cat-support); }
        .tag-shop { background: var(--cat-shop); }
        .checkin-card-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .checkin-card-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 2px;
            line-height: 1.4;
        }
        .checkin-card-desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.3;
        }
        .checkin-card-nav {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 8px;
            border-radius: 12px;
            background: var(--accent-light);
            color: var(--accent);
            font-size: 11px;
            cursor: pointer;
            border: none;
            font-weight: 500;
            flex-shrink: 0;
        }
        .checkin-card-nav:active { opacity: 0.7; }
        .checkin-card-show {
            display: inline-flex; align-items: center; gap: 3px;
            padding: 2px 8px; border-radius: 12px;
            background: var(--accent-light); color: var(--accent);
            font-size: 11px; cursor: pointer; border: none; font-weight: 500;
            flex-shrink: 0; opacity: 0.6;
        }
        .checkin-card-show.active {
            opacity: 1; background: var(--accent); color: white;
        }
        .checkin-card-show:active { opacity: 0.7; }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-white);
            font-size: 14px;
            color: var(--text);

    // ===== Lunar Calendar (lightweight, no external lib) =====

            0x0e968,0x0d520,0x0daa0,0x16aa6,0x056d0,0x04ae0,0x0a9d4,0x0a4d0,0x0d150,0x0f252,
            0x0d520
        ];

        const Gan = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
        const Zhi = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
        const Animals = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
        const monthNames = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
        const dayNames = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
            '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
            '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

        function lYearDays(y) {
            let s = 348;
            for (let i = 0x8000; i > 0x8; i >>= 1) s += (lunarInfo[y - 1900] & i) ? 1 : 0;
            return s + leapDays(y);
        }
        function leapMonth(y) { return lunarInfo[y - 1900] & 0xf; }
        function leapDays(y) { if (leapMonth(y)) return (lunarInfo[y - 1900] & 0x10000) ? 30 : 29; return 0; }
        function monthDays(y, m) { return (lunarInfo[y - 1900] & (0x10000 >> m)) ? 30 : 29; }

        function solar2lunar(yy, mm, dd) {
            const baseDate = new Date(1900, 0, 31);
            const objDate = new Date(yy, mm - 1, dd);
            let offset = Math.floor((objDate - baseDate) / 86400000);
            let lunarYear, lunarMonth, lunarDay, isLeap = false;

            for (lunarYear = 1900; lunarYear < 2101 && offset > 0; lunarYear++) {
                const daysInYear = lYearDays(lunarYear);
                offset -= daysInYear;
            }
            if (offset < 0) { offset += lYearDays(--lunarYear); }

            const leap = leapMonth(lunarYear);
            for (lunarMonth = 1; lunarMonth < 13 && offset > 0; lunarMonth++) {
                if (leap > 0 && lunarMonth === (leap + 1) && !isLeap) {
                    --lunarMonth; isLeap = true;
                    const daysInMonth = leapDays(lunarYear);
                    offset -= daysInMonth;
                } else {
                    const daysInMonth = monthDays(lunarYear, lunarMonth);
                    offset -= daysInMonth;
                }
                if (isLeap && lunarMonth === (leap + 1)) isLeap = false;
            }
            if (offset === 0 && leap > 0 && lunarMonth === leap + 1) {
                if (isLeap) { isLeap = false; } else { isLeap = true; --lunarMonth; }
            }
            if (offset < 0) { offset += monthDays(lunarYear, --lunarMonth); }
            lunarDay = offset + 1;

            // Special days
            let dayStr = dayNames[lunarDay - 1];
            // Show month name for first day of month
            if (lunarDay === 1) dayStr = (isLeap ? '闰' : '') + monthNames[lunarMonth - 1] + '月';
            // Show festivals
            if (lunarMonth === 1 && lunarDay === 1) dayStr = '春节';
            else if (lunarMonth === 1 && lunarDay === 15) dayStr = '元宵';
            else if (lunarMonth === 5 && lunarDay === 5) dayStr = '端午';
            else if (lunarMonth === 7 && lunarDay === 7) dayStr = '七夕';
            else if (lunarMonth === 7 && lunarDay === 15) dayStr = '中元';
            else if (lunarMonth === 8 && lunarDay === 15) dayStr = '中秋';
            else if (lunarMonth === 9 && lunarDay === 9) dayStr = '重阳';
            else if (lunarMonth === 12 && lunarDay === 30) dayStr = '除夕';
            // Solar festivals
            if (mm === 1 && dd === 1) dayStr = '元旦';
            else if (mm === 2 && dd === 14) dayStr = '情人节';
            else if (mm === 3 && dd === 8) dayStr = '妇女节';
            else if (mm === 4 && dd === 1) dayStr = '愚人节';
            else if (mm === 5 && dd === 1) dayStr = '劳动节';
            else if (mm === 5 && dd === 4) dayStr = '青年节';
            else if (mm === 6 && dd === 1) dayStr = '儿童节';
            else if (mm === 7 && dd === 1) dayStr = '建党节';
            else if (mm === 8 && dd === 1) dayStr = '建军节';
            else if (mm === 9 && dd === 10) dayStr = '教师节';
            else if (mm === 10 && dd === 1) dayStr = '国庆节';
            else if (mm === 10 && dd === 31) dayStr = '万圣节';
            else if (mm === 12 && dd === 24) dayStr = '平安夜';
            else if (mm === 12 && dd === 25) dayStr = '圣诞节';

            return { lunarDay: dayStr };
        }

        return { solar2lunar };
    })();

    // ===== State =====
    let currentFilter = 'all';
    let currentView = 'checkin';
    const _now = new Date();
    let calendarYear = _now.getFullYear();
    let calendarMonth = _now.getMonth();
    let selectedDate = null;
    let activeItemId = null;
    let map, mapLayers = [];
    const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    let statsOpen = !isMobile;
    let timeStart = null, timeEnd = null;
    let timeMonths = [];
    let echartsInstances = [];
    let checkinItems = [];

    let pendingNavName = '';

    // ===== DATA =====
    // 数据从云数据库加载，不在此硬编码
    let allItems = [];

    // ===== Helper Functions =====
    function getItemType(item) {
        if (item.persons.includes('yunqi') && item.persons.includes('haoyiran')) return 'both';
        if (item.persons.includes('yunqi')) return 'yunqi';
        if (item.persons.includes('haoyiran')) return 'haoyiran';
        return 'both';
    }
    function getColor(type) {
        switch(type) { case 'yunqi': return '#F57C00'; case 'haoyiran': return '#E53935'; case 'both': return '#00ACC1'; }
    }
    function getTypeName(type) {
        switch(type) { case 'yunqi': return '云旗'; case 'haoyiran': return '郝熠然'; case 'both': return '双人'; }
    }
    function getTransportIcon(t) {
        switch(t) { case 'flight': return '✈️'; case 'train': return '🚄'; case 'car': return '🚗'; default: return '🔗'; }
    }

    function getFiltered() {
        let list = currentFilter === 'all' ? allItems : allItems.filter(i => getItemType(i) === currentFilter);
        if (timeStart) list = list.filter(i => i.date >= timeStart);
        if (timeEnd) list = list.filter(i => i.date <= timeEnd + '-31');
        return list;
    }
    function getItemsByDate() {
        const m = {};
        allItems.forEach(i => { if (!m[i.date]) m[i.date] = []; m[i.date].push(i); });
        return m;
    }
    function stripHtml(html) {
        if (!html) return '';
        const tmp = document.createElement('div');
        tmp.innerHTML = html;
        return tmp.textContent || tmp.innerText || '';
    }

    // ===== Time Slider =====
    function initTimeSlider() {
        if (allItems.length === 0) return;
        const months = new Set();
        allItems.forEach(i => months.add(i.date.substring(0, 7)));
        const sorted = [...months].sort();
        const first = sorted[0], last = sorted[sorted.length - 1];
        const fy = parseInt(first.split('-')[0]), fm = parseInt(first.split('-')[1]);
        const ly = parseInt(last.split('-')[0]), lm = parseInt(last.split('-')[1]);
        let y = fy, m = fm;
        timeMonths = [];
        while (y < ly || (y === ly && m <= lm)) {
            timeMonths.push(`${y}-${String(m).padStart(2, '0')}`);
            m++;
            if (m > 12) { m = 1; y++; }
        }
        const ey = y, em = m;
        if (em > 12) { timeMonths.push(`${ey + 1}-01`); }
        else { timeMonths.push(`${ey}-${String(em).padStart(2, '0')}`); }

        const maxVal = timeMonths.length - 1;
        const sliderStart = document.getElementById('timeSliderStart');
        const sliderEnd = document.getElementById('timeSliderEnd');
        sliderStart.max = maxVal;
        sliderEnd.max = maxVal;
        sliderStart.value = 0;
        sliderEnd.value = maxVal;

        const ticks = document.getElementById('timeSliderTicks');
        let ticksHtml = '';
        timeMonths.forEach((m, i) => {
            if (i === 0 || i === maxVal || (i % 3 === 0 && timeMonths.length <= 15) || (i % 6 === 0)) {
                ticksHtml += `<span>${m}</span>`;
            } else {
                ticksHtml += `<span></span>`;
            }
        });
        ticks.innerHTML = ticksHtml;

        updateTimeRangeDisplay();
    }

    function onTimeSliderChange() {
        let s = parseInt(document.getElementById('timeSliderStart').value);
        let e = parseInt(document.getElementById('timeSliderEnd').value);
        if (s > e) { [s, e] = [e, s]; }
        timeStart = timeMonths[s];
        timeEnd = timeMonths[e];
        updateTimeRangeDisplay();
        refreshAll();
        renderCharts();
    }

    function updateTimeRangeDisplay() {
        document.getElementById('timeRangeStart').textContent = timeStart || timeMonths[0];
        document.getElementById('timeRangeEnd').textContent = timeEnd || timeMonths[timeMonths.length - 1];
    }

    function resetTimeSlider() {
        timeStart = null; timeEnd = null;
        document.getElementById('timeSliderStart').value = 0;
        document.getElementById('timeSliderEnd').value = timeMonths.length - 1;
        updateTimeRangeDisplay();
        refreshAll();
        renderCharts();
    }

    // ===== Map =====
    function initMap() {
        map = L.map('map', { center: [30, 110], zoom: 4, zoomControl: false });
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // 腾讯地图底图（GCJ-02 坐标系，注意 y 轴用负值）
        L.tileLayer('https://rt{s}.map.gtimg.com/realtimerender?z={z}&x={x}&y={-y}&type=vector&style=0', {
            subdomains: '0123',
            attribution: '&copy; <a href="https://map.qq.com/">腾讯地图</a>',
            maxZoom: 18
        }).addTo(map);

        renderMap();
    }
    function renderMap() {
        mapLayers.forEach(l => map.removeLayer(l));
        mapLayers = [];
        const filtered = getFiltered();
        filtered.forEach(item => {
            const color = getColor(getItemType(item));
            if (item.type === 'trip' && item.fromCoord && item.toCoord) {
                if (item.fromCoord[0] !== item.toCoord[0] || item.fromCoord[1] !== item.toCoord[1]) {
                    const line = drawCurvedLine(item.fromCoord, item.toCoord, color);
                    if (line) mapLayers.push(line);
                    const m1 = L.marker(item.fromCoord, { icon: createRouteMarker(item.from.charAt(0), color, false) }).addTo(map);
                    m1.bindPopup(createTripPopup(item, 'from'));
                    mapLayers.push(m1);
                    const m2 = L.marker(item.toCoord, { icon: createRouteMarker(item.to.charAt(0), color, true) }).addTo(map);
                    m2.bindPopup(createTripPopup(item, 'to'));
                    mapLayers.push(m2);
                }
            } else if (item.type === 'event' && item.coord) {
                const m = L.marker(item.coord, { icon: createEventPin(color) }).addTo(map);
                m.bindPopup(createEventPopup(item));
                mapLayers.push(m);
            }
        });
    }
    function drawCurvedLine(from, to, color) {
        const points = [], steps = 50;
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const lat = from[0] + (to[0] - from[0]) * t;
            const lng = from[1] + (to[1] - from[1]) * t;
            const dist = Math.sqrt(Math.pow(to[0] - from[0], 2) + Math.pow(to[1] - from[1], 2));
            points.push([lat + Math.sin(t * Math.PI) * dist * 0.15, lng]);
        }
        return L.polyline(points, { color, weight: 2.5, opacity: 0.8, dashArray: '8, 6' }).addTo(map);
    }
    function createRouteMarker(letter, color, isDest) {
        const s = isDest ? 28 : 22, fs = isDest ? 13 : 10;
        return L.divIcon({
            className: 'custom-marker',
            html: `<div style="width:${s}px;height:${s}px;border-radius:50%;background:${color};border:3px solid white;display:flex;align-items:center;justify-content:center;font-size:${fs}px;font-weight:700;color:white;box-shadow:0 2px 8px rgba(0,0,0,0.2);font-family:'Noto Sans SC',sans-serif;">${letter}</div>`,
            iconSize: [s, s], iconAnchor: [s/2, s/2], popupAnchor: [0, -s/2]
        });
    }
    function createEventPin(color) {
        return L.divIcon({
            className: 'custom-marker',
            html: `<div style="width:16px;height:16px;border-radius:50%;background:${color};border:2.5px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.2);"></div>`,
            iconSize: [16, 16], iconAnchor: [8, 8], popupAnchor: [0, -8]
        });
    }

                <div class="trip-meta"><span><i class="fas fa-calendar-alt"></i>${item.date}</span>
                    ${item.type === 'trip' ? '<span><i class="fas fa-plane"></i>路线</span>' : '<span><i class="fas fa-map-pin"></i>事件</span>'}</div>

                <div class="trip-card-actions">
                    ${item.link ? `<button class="trip-card-btn" onclick="event.stopPropagation();window.open('${item.link}','_blank')"><i class="fas fa-link"></i> 链接</button>` : ''}

    function flyToItem(id) {
        const item = allItems.find(i => i.id === id);
        if (!item) return;
        activeItemId = id;
        let coords;
        if (item.type === 'trip' && item.fromCoord && item.toCoord) coords = [item.fromCoord, item.toCoord];
        else if (item.coord) coords = [item.coord];
        if (coords && coords.length > 0) {
            if (coords.length === 1) map.flyTo(coords[0], 10, { duration: 1 });
            else map.flyToBounds(L.latLngBounds(coords).pad(0.3), { duration: 1.2 });
        }
        renderList();
        selectedDate = item.date;
        if (currentView === 'calendar') renderCalendar();

    // ===== Calendar =====
    function renderCalendar() {
        const container = document.getElementById('calendarContainer');
        const filtered = getFiltered();
        const filteredDates = {};
        filtered.forEach(i => { if (!filteredDates[i.date]) filteredDates[i.date] = []; filteredDates[i.date].push(i); });
        const today = new Date();
        const year = calendarYear, month = calendarMonth;
        const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
        const weekdays = ['一','二','三','四','五','六','日'];
        const firstDay = new Date(year, month, 1);
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        let startWeekday = firstDay.getDay() - 1;
        if (startWeekday < 0) startWeekday = 6;
        const prevMonthLastDay = new Date(year, month, 0).getDate();

        let html = `<div class="calendar-nav">
            <button class="calendar-nav-btn" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
            <span class="calendar-month-label">${year}年 ${monthNames[month]}</span>
            <div style="display:flex;gap:6px;align-items:center;">
                <button class="calendar-today-btn" onclick="goToday()">今天</button>
                <button class="calendar-nav-btn" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div><div class="calendar-grid">`;

        weekdays.forEach(d => { html += `<div class="calendar-weekday">${d}</div>`; });
        // Previous month padding
        const prevMonth = month === 0 ? 11 : month - 1;
        const prevYear = month === 0 ? year - 1 : year;
        for (let i = startWeekday - 1; i >= 0; i--) {
            const pd = prevMonthLastDay - i;
            const lunar = LunarCal.solar2lunar(prevYear, prevMonth + 1, pd);
            html += `<div class="calendar-day other-month">${pd}<span class="calendar-lunar">${lunar.lunarDay}</span></div>`;
        }
        // Current month
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isToday = (year === today.getFullYear() && month === today.getMonth() && d === today.getDate());
            const isSelected = (selectedDate === dateStr);
            const dayItems = filteredDates[dateStr] || [];
            let cls = 'calendar-day';
            if (isToday) cls += ' today';
            if (isSelected) cls += ' selected';
            if (dayItems.length > 0) cls += ' has-trips';
            if ((timeStart && dateStr < timeStart) || (timeEnd && dateStr > timeEnd + '-31')) cls += ' out-of-range';
            let dots = '';
            if (dayItems.length > 0) {
                dots = '<div class="trip-dots">';
                dayItems.slice(0, 4).forEach(i => { dots += `<div class="trip-dot" style="background:${getColor(getItemType(i))};"></div>`; });
                dots += '</div>';
            }
            // Lunar calendar
            const lunar = LunarCal.solar2lunar(year, month + 1, d);
            html += `<div class="${cls}" onclick="selectDate('${dateStr}')"><span class="calendar-lunar">${lunar.lunarDay}</span>${d}${dots}</div>`;
        }
        // Next month padding
        const nextMonth = month === 11 ? 0 : month + 1;
        const nextYear = month === 11 ? year + 1 : year;
        const totalCells = startWeekday + daysInMonth;
        const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
        for (let i = 1; i <= remaining; i++) {
            const lunar = LunarCal.solar2lunar(nextYear, nextMonth + 1, i);
            html += `<div class="calendar-day other-month">${i}<span class="calendar-lunar">${lunar.lunarDay}</span></div>`;
        }
        html += '</div>';

        if (selectedDate) {
            const dateItems = (filteredDates[selectedDate] || []).sort((a, b) => a.type === 'trip' ? -1 : 1);
            if (dateItems.length > 0) {
                html += `<div class="calendar-trip-detail"><div class="calendar-trip-detail-title"><i class="fas fa-plane" style="color:var(--accent);margin-right:4px;"></i>${selectedDate}（${dateItems.length}条）</div>`;
                dateItems.forEach(item => {
                    const color = getColor(getItemType(item));
                    const icon = item.type === 'trip' ? getTransportIcon(item.transport) : '📍';
                    const label = item.type === 'trip' ? `${item.from} → ${item.to}` : stripHtml(item.title || (item.city && item.location && item.city !== item.location ? `${item.city} · ${item.location}` : (item.city || item.location || '')));
                    html += `<div class="calendar-trip-item" onclick="flyToItem('${item.id}')">
                        <div class="calendar-trip-item-dot" style="background:${color};"></div>
                        <div><div class="calendar-trip-item-route">${icon} ${label}</div>
                        <div class="calendar-trip-item-meta">${stripHtml(item.desc)}</div></div></div>`;
                });
                html += '</div>';
            } else {
                html += `<div class="calendar-trip-detail"><div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px;"><i class="fas fa-calendar-check" style="font-size:20px;display:block;margin-bottom:6px;"></i>${selectedDate} 暂无记录</div></div>`;
            }
        }
        container.innerHTML = html;
    }
    function selectDate(dateStr) {
        selectedDate = dateStr; renderCalendar();
        const dayItems = getFiltered().filter(i => i.date === dateStr);
        if (dayItems.length > 0) {
            const coords = dayItems.map(i => i.type === 'trip' && i.fromCoord ? i.fromCoord : i.coord).filter(Boolean);
            if (coords.length) map.flyToBounds(L.latLngBounds(coords).pad(0.3), { duration: 1 });
        }
    }
    function changeMonth(delta) {
        calendarMonth += delta;
        if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
        if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
        selectedDate = null; renderCalendar();
    }
    function goToday() {
        const today = new Date();
        calendarYear = today.getFullYear(); calendarMonth = today.getMonth();
        selectedDate = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        renderCalendar();
    }

    // ===== ECharts =====
    function renderCharts() {
        if (!statsOpen) return;
        const filtered = getFiltered();

        // --- Sunburst ---
        const sunburstEl = document.getElementById('chartSunburst');
        if (!echartsInstances[0]) echartsInstances[0] = echarts.init(sunburstEl);
        const yqCount = filtered.filter(i => i.persons.includes('yunqi') && !i.persons.includes('haoyiran')).length;
        const hyrCount = filtered.filter(i => i.persons.includes('haoyiran') && !i.persons.includes('yunqi')).length;
        const bothCount = filtered.filter(i => i.persons.includes('yunqi') && i.persons.includes('haoyiran')).length;

        echartsInstances[0].setOption({
            tooltip: { trigger: 'item', formatter: function(p) { return p.name + ': ' + p.value + ' (' + (p.percent !== undefined ? p.percent : (p.data && p.data.percent !== undefined ? p.data.percent : '--')) + '%)'; } },
            series: [{
                type: 'sunburst',
                radius: ['15%', '90%'],
                label: { rotate: 'radial', fontSize: 11, fontFamily: 'Noto Sans SC', formatter: function(p) { return p.name + ' ' + (p.percent !== undefined ? p.percent + '%' : ''); } },
                data: [
                    { name: '云旗', value: yqCount, itemStyle: { color: '#F57C00' },
                      children: [
                        { name: '路线', value: filtered.filter(i => i.persons.includes('yunqi') && !i.persons.includes('haoyiran') && i.type === 'trip').length, itemStyle: { color: '#FF9800' } },
                        { name: '事件', value: filtered.filter(i => i.persons.includes('yunqi') && !i.persons.includes('haoyiran') && i.type === 'event').length, itemStyle: { color: '#FFE0B2' } }
                      ]
                    },
                    { name: '郝熠然', value: hyrCount, itemStyle: { color: '#E53935' },
                      children: [
                        { name: '路线', value: filtered.filter(i => i.persons.includes('haoyiran') && !i.persons.includes('yunqi') && i.type === 'trip').length, itemStyle: { color: '#EF5350' } },
                        { name: '事件', value: filtered.filter(i => i.persons.includes('haoyiran') && !i.persons.includes('yunqi') && i.type === 'event').length, itemStyle: { color: '#FFCDD2' } }
                      ]
                    },
                    { name: '双人', value: bothCount, itemStyle: { color: '#00ACC1' },
                      children: [
                        { name: '路线', value: filtered.filter(i => i.persons.includes('yunqi') && i.persons.includes('haoyiran') && i.type === 'trip').length, itemStyle: { color: '#26C6DA' } },
                        { name: '事件', value: filtered.filter(i => i.persons.includes('yunqi') && i.persons.includes('haoyiran') && i.type === 'event').length, itemStyle: { color: '#B2EBF2' } }
                      ]
                    }
                ]
            }]
        }, true);

        // --- Monthly Distribution ---

            if (!monthData[ym]) monthData[ym] = { yunqi: 0, haoyiran: 0, both: 0 };
            const type = getItemType(i);
            monthData[ym][type]++;
        });
        const monthKeys = Object.keys(monthData).sort();
        const monthLabels = monthKeys.map(k => { const [y, m] = k.split('-'); return `${m}月`; });

        echartsInstances[1].setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            legend: { data: ['云旗', '郝熠然', '双人'], top: 0, textStyle: { fontSize: 11, fontFamily: 'Noto Sans SC' } },
            grid: { top: 30, right: 10, bottom: 25, left: 40 },
            xAxis: { type: 'category', data: monthLabels, axisLabel: { fontSize: 10, fontFamily: 'Noto Sans SC' }, axisTick: { show: false } },
            yAxis: { type: 'value', minInterval: 1, axisLabel: { fontSize: 10 }, splitLine: { lineStyle: { type: 'dashed', color: '#E2E8F0' } } },
            series: [
                { name: '云旗', type: 'bar', stack: 'total', data: monthKeys.map(k => monthData[k].yunqi), color: '#F57C00', barMaxWidth: 28, itemStyle: { borderRadius: [0, 0, 0, 0] } },
                { name: '郝熠然', type: 'bar', stack: 'total', data: monthKeys.map(k => monthData[k].haoyiran), color: '#E53935', barMaxWidth: 28 },
                { name: '双人', type: 'bar', stack: 'total', data: monthKeys.map(k => monthData[k].both), color: '#00ACC1', barMaxWidth: 28, itemStyle: { borderRadius: [3, 3, 0, 0] } }
            ]
        }, true);

        // --- City Ranking ---
        const cityEl = document.getElementById('chartCity');
        if (!echartsInstances[2]) echartsInstances[2] = echarts.init(cityEl);

        const cityCount = {};
        filtered.forEach(i => {
            const cities = [];
            if (i.type === 'trip') {
                if (i.fromCity) cities.push(i.fromCity);
                else if (i.from) cities.push(i.from);
                if (i.toCity) cities.push(i.toCity);
                else if (i.to) cities.push(i.to);
            } else {
                if (i.city) cities.push(i.city);
                else if (i.location) cities.push(i.location);
                if (i.fromCity) cities.push(i.fromCity);
                if (i.toCity) cities.push(i.toCity);
            }
            cities.forEach(c => {
                if (c) cityCount[c] = (cityCount[c] || 0) + 1;
            });
        });
        const citySorted = Object.entries(cityCount).sort((a, b) => b[1] - a[1]).slice(0, 10);
        const cityNames = citySorted.map(c => c[0]).reverse();
        const cityValues = citySorted.map(c => c[1]).reverse();

        const maxCity = Math.max(...cityValues, 1);
        const cityColors = cityValues.map(v => {
            const ratio = v / maxCity;
            if (ratio > 0.7) return '#00ACC1';
            if (ratio > 0.4) return '#3182CE';
            return '#90CDF4';
        });

        echartsInstances[2].setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, formatter: '{b}: {c} 次' },
            grid: { top: 5, right: 40, bottom: 5, left: 55 },
            xAxis: { type: 'value', minInterval: 1, axisLabel: { fontSize: 10 }, splitLine: { lineStyle: { type: 'dashed', color: '#E2E8F0' } } },
            yAxis: { type: 'category', data: cityNames, axisLabel: { fontSize: 11, fontFamily: 'Noto Sans SC' }, axisTick: { show: false } },
            series: [{
                type: 'bar', data: cityValues.map((v, i) => ({ value: v, itemStyle: { color: cityColors[i], borderRadius: [0, 4, 4, 0] } })),
                barMaxWidth: 20,
                label: { show: true, position: 'right', fontSize: 11, fontWeight: 600, color: '#4A5568', formatter: '{c}次' }
            }]
        }, true);
    }

    // ===== Init =====
    initMap();
    renderList();
    initTimeSlider();
    calendarYear = new Date().getFullYear();
    calendarMonth = new Date().getMonth();

    // 从云数据库加载最新数据
    function loadFromCloud() {
        if (typeof cloud === 'undefined') {
            console.warn('Cloud SDK not loaded, using fallback data');
            return Promise.resolve(false);
        }
        const c1 = new cloud.Cloud({
            identityless: true,
            ...CLOUD_CONFIG
        });
        return c1.init().then(() => {
            const db = c1.database();
            // 分批加载（云数据库单次最多20条）
            const MAX = 20;
            let allData = [];
            const batch = (skip) => {
                return db.collection('trips')
                    .orderBy('date', 'desc')
                    .skip(skip)
                    .limit(MAX)
                    .get()
                    .then(res => {
                        allData = allData.concat(res.data);
                        if (res.data.length === MAX) return batch(skip + MAX);
                        return allData;
                    });
            };
            return batch(0).then(data => {
                if (data.length > 0) {
                    // 用云端数据替换 allItems
                    allItems.length = 0;
                    allItems.push(...data);
                    // 重新渲染所有内容
                    renderList();
                    renderMap();
                    initTimeSlider();
                    refreshAll();
                    setTimeout(() => { renderCharts(); resizeCharts(); }, 100);
                    console.log('已从云数据库加载', data.length, '条行程');
                    return true;
                }
                return false;
            });
        }).catch(err => {
            console.warn('云数据库加载失败:', err.message || err);
            const listEl = document.getElementById('trip-list');
            if (listEl) listEl.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#999;">数据加载失败，请刷新重试</div>';
            return false;
        });
    }

    // ===== Checkin (打卡) =====
    const CATEGORIES = {
        love: { name: '爱情圣地', color: '#00ACC1' },
        h52: { name: '52圣地', color: '#FF5722' },
        biz: { name: '活动商务', color: '#9C27B0' },
        support: { name: '应援打卡', color: '#FF69B4' },
        shop: { name: '主题商店', color: '#4CAF50' }
    };

    const CHECKINS_FALLBACK = [
        {"name":"八面咖啡","category":"love","city":"横店","coord":[29.15,120.33],"startDate":"2025-04-08","endDate":"2025-04-08","desc":"两人第一次相见的地方"},
        {"name":"冠宇牡丹园","category":"biz","city":"菏泽","coord":[35.25,115.47],"startDate":"2026-04-30","endDate":"2026-05-01","desc":"冠宇牡丹园活动"},
        {"name":"重庆超体京东MALL","category":"support","city":"重庆","coord":[29.593,106.544],"address":"重庆市江北区金渝大道149号","startDate":"2026-04-30","endDate":"2026-05-01","brand":"幸棉","supportType":"户外大屏"},
        {"name":"苏州京东MALL","category":"support","city":"苏州","coord":[31.375,120.639],"address":"苏州市相城区嘉元路188号王府井1-3层","startDate":"2026-04-30","endDate":"2026-05-01","brand":"幸棉","supportType":"户外大屏"},
        {"name":"天津京东MALL","category":"support","city":"天津","coord":[39.13,117.2],"address":"天津市南开区南马路18号","startDate":"2026-04-30","endDate":"2026-05-01","brand":"幸棉","supportType":"户外西南面裸眼3D屏"},
        {"name":"广州京东MALL","category":"support","city":"广州","coord":[23.084,113.264],"address":"广州市海珠区工业大道110号","startDate":"2026-04-30","endDate":"2026-05-01","brand":"幸棉","supportType":"室外裸眼3D"},
        {"name":"武汉京东MALL","category":"support","city":"武汉","coord":[30.588,114.316],"address":"武汉市武昌区秦园路26号","startDate":"2026-04-30","endDate":"2026-05-01","brand":"幸棉","supportType":"室外裸眼3D"},
        {"name":"长沙京东MALL","category":"support","city":"长沙","coord":[28.152,112.883],"address":"长沙市岳麓区洋湖街道景园路376号","startDate":"2026-04-30","endDate":"2026-05-01","brand":"幸棉","supportType":"户外大屏（主入口）"},
        {"name":"西安曲江京东MALL","category":"support","city":"西安","coord":[34.227,108.981],"address":"西安市雁塔区曲江路618号汉华城","startDate":"2026-04-30","endDate":"2026-05-01","brand":"幸棉","supportType":"裸眼3D大屏"},
        {"name":"成都京东MALL","category":"support","city":"成都","coord":[30.636,104.065],"address":"成都市武侯区盛和一路66号","startDate":"2026-04-30","endDate":"2026-05-01","brand":"幸棉","supportType":"裸眼3D大屏"},
        {"name":"深圳京东MALL","category":"support","city":"深圳","coord":[22.539,113.931],"address":"深圳市南山区南海大道2746号","startDate":"2026-04-30","endDate":"2026-05-01","brand":"幸棉","supportType":"中庭大屏"},
        {"name":"北京京东MALL（双井店）","category":"support","city":"北京","coord":[39.898,116.471],"address":"北京市朝阳区广渠路31号","startDate":"2026-04-30","endDate":"2026-05-01","brand":"幸棉","supportType":"中庭大屏"},
        {"name":"太原京东MALL","category":"support","city":"太原","coord":[37.807,112.556],"address":"太原市小店区长风街125号","startDate":"2026-04-30","endDate":"2026-05-01","brand":"幸棉","supportType":"裸眼3D大屏"},
        {"name":"沈阳京东MALL","category":"support","city":"沈阳","coord":[41.81,123.475],"address":"沈阳市大东区滂江街22号龙之梦购物中心","startDate":"2026-04-30","endDate":"2026-05-01","brand":"幸棉","supportType":"裸眼3D大屏"}
    ];

    let userCoord = null; // 用户当前位置坐标

    function sortCheckins(items) {
        // 按结束时间最近的排在前面（endDate 升序，未来的靠前）
        // 相同 endDate 则按距离用户从近到远排
        return items.sort((a, b) => {
            const da = a.endDate || a.startDate;
            const db2 = b.endDate || b.startDate;
            const cmp = da.localeCompare(db2);
            if (cmp !== 0) return cmp;
            if (!userCoord || !a.coord || !b.coord) return 0;
            const distA = Math.hypot((a.coord[0]||0) - userCoord[0], (a.coord[1]||0) - userCoord[1]);
            const distB = Math.hypot((b.coord[0]||0) - userCoord[0], (b.coord[1]||0) - userCoord[1]);
            return distA - distB;
        });
    }

    function tryGetUserLocation() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(
            pos => {
                userCoord = [pos.coords.latitude, pos.coords.longitude];
                // 重新排序并刷新列表
                checkinItems = sortCheckins(checkinItems);
                renderCheckinList();
            },
            () => {} // 静默失败，不影响使用
        );
    }

    function loadCheckins() {
        if (typeof cloud === 'undefined') {
            checkinItems = sortCheckins([...CHECKINS_FALLBACK]);
            renderCheckinList();
            return Promise.resolve(false);
        }
        const c1 = new cloud.Cloud({ identityless: true, ...CLOUD_CONFIG });
        return c1.init().then(() => {
            const db = c1.database();
            const MAX = 20;
            let allData = [];
            const batch = (skip) => {
                return db.collection('checkins').orderBy('endDate', 'asc').skip(skip).limit(MAX).get()
                    .then(res => {
                        allData = allData.concat(res.data);
                        if (res.data.length === MAX) return batch(skip + MAX);
                        return allData;
                    });
            };
            return batch(0).then(data => {
                // 从 trips 集合查找带 checkinTag 的记录，转换为打卡格式合并
                return db.collection('trips').where({ checkinTag: db.command.exists(true) }).get()
                    .then(res => {
                        const fromTrips = res.data.map(t => ({
                            name: t.location || t.name || '',
                            category: t.checkinTag,
                            city: t.city || '',
                            coord: t.coord || [],
                            startDate: t.date || '',
                            endDate: t.date || '',
                            desc: t.desc || '',
                            address: t.address || '',
                            brand: t.brand || '',
                            supportType: t.supportType || ''
                        }));
                        // 合并：以 name 去重，trips 补充的数据优先保留 checkins 中的
                        const names = new Set(data.map(d => d.name));
                        fromTrips.forEach(t => {
                            if (!names.has(t.name)) data.push(t);
                        });
                        checkinItems = data.length ? sortCheckins(data) : sortCheckins([...CHECKINS_FALLBACK]);
                        renderCheckinList();
                        console.log('已从云数据库加载', data.length, '条打卡（含 trips 标记', fromTrips.length, '条）');
                    });
            });
        }).catch(err => {
            console.warn('打卡数据加载失败，使用本地数据:', err.message || err);
            checkinItems = sortCheckins([...CHECKINS_FALLBACK]);
            renderCheckinList();
        });
    }

    function filterCheckin(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('#categoryTabs .category-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderCheckinList();
    }

    function getFilteredCheckins() {
        return currentCategory === 'all' ? checkinItems : checkinItems.filter(i => i.category === currentCategory);
    }

    function renderCheckinList() {
        const container = document.getElementById('checkinList');
        const stats = document.getElementById('checkinStats');
        const filtered = getFilteredCheckins();
        stats.textContent = `共 ${filtered.length} 个打卡地`;
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px;"><i class="fas fa-map-marker-alt" style="font-size:32px;display:block;margin-bottom:12px;"></i>暂无打卡地点</div>';
            return;
        }
        container.innerHTML = filtered.map(item => {
            const cat = CATEGORIES[item.category] || { name: '', color: '#999' };
            const dateStr = item.startDate === item.endDate ? item.startDate : `${item.startDate} ~ ${item.endDate}`;
            const safeName = (item.name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
            const addressLine = item.address ? `<div class="checkin-card-meta"><i class="fas fa-location-dot"></i> ${item.address}</div>` : '';
            const metaLine = (item.brand || item.supportType)
                ? `<div class="checkin-card-meta">${item.brand ? `<i class="fas fa-tag"></i> 投放方：${item.brand}` : ''}${item.brand && item.supportType ? ' · ' : ''}${item.supportType ? `<i class="fas fa-bullhorn"></i> 应援类型：${item.supportType}` : ''}</div>`
                : '';
            // 导航目标：优先 城市+地址+名称，其次 城市+名称
            const navTarget = item.address
                ? `${item.city}${item.address}${item.name}` : `${item.city}${item.name}`;
            // 唯一标识，用于"显示"功能
            const markerKey = (item.city + '_' + item.name).replace(/[^a-zA-Z0-9\u4e00-\u9fff_]/g, '');
            if (!checkinMarkersMap[markerKey]) {
                checkinMarkersMap[markerKey] = { coord: item.coord, name: item.name, category: item.category, city: item.city, address: item.address, marker: null };
            }
            const isShown = checkinMarkersMap[markerKey] && checkinMarkersMap[markerKey].marker;
            return `<div class="checkin-card" onclick="flyToCheckin(${item.coord[0]},${item.coord[1]})">
                <div class="checkin-card-header">
                    <span class="checkin-card-tag tag-${item.category}">${cat.name}</span>
                </div>
                <div class="checkin-card-name"><span>${item.name}</span><span style="display:flex;gap:4px;flex-shrink:0;"><button class="checkin-card-show ${isShown?'active':''}" data-key="${markerKey}" onclick="event.stopPropagation();toggleSingleCheckinMarker(this.dataset.key)"><i class="fas ${isShown?'fa-eye':'fa-eye-slash'}"></i> ${isShown?'隐藏':'显示'}</button><button class="checkin-card-nav" data-lat="${item.coord[0]}" data-lng="${item.coord[1]}" data-name="${navTarget.replace(/"/g, '&quot;')}" onclick="event.stopPropagation();showNavModal(this.dataset.lat,this.dataset.lng,this.dataset.name)"><i class="fas fa-directions"></i> 导航</button></span></div>
                <div class="checkin-card-meta"><i class="fas fa-map-pin"></i> ${item.city} · ${dateStr}</div>
                ${addressLine}
                ${metaLine}
                ${item.desc ? `<div class="checkin-card-desc">${item.desc}</div>` : ''}
            </div>`;
        }).join('');
    }

    function flyToCheckin(lat, lng) {
        map.flyTo([lat, lng], 14, { duration: 1 });
    }

    function toggleCheckinMap(show) {
        if (show) {
            renderCheckinMap();
        } else {
            // 移除所有打卡标记（包括单个显示的）
            mapLayers = mapLayers.filter(l => {
                if (l._isCheckin) { map.removeLayer(l); return false; }
                return true;
            });
            // 清除单个标记记录
            Object.keys(checkinMarkersMap).forEach(k => { checkinMarkersMap[k].marker = null; });
        }
    }

    const CAT_COLORS = { love: '#00ACC1', h52: '#FF5722', biz: '#9C27B0', support: '#FF69B4', shop: '#4CAF50' };

    function toggleSingleCheckinMarker(key) {
        const entry = checkinMarkersMap[key];
        if (!entry || !entry.coord) return;
        if (entry.marker) {
            // 隐藏：移除标记
            map.removeLayer(entry.marker);
            mapLayers = mapLayers.filter(l => l !== entry.marker);
            entry.marker = null;
        } else {
            // 显示：添加标记
            const color = CAT_COLORS[entry.category] || '#3182CE';
            const icon = L.divIcon({
                className: '',
                html: `<div style="width:14px;height:14px;background:${color};border:2px solid white;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>`,
                iconSize: [14, 14], iconAnchor: [7, 7]
            });
            const marker = L.marker(entry.coord, { icon }).addTo(map)
                .bindPopup(`<b>${entry.name}</b><br>${entry.city}${entry.address ? '<br>' + entry.address : ''}`);
            marker._isCheckin = true;
            entry.marker = marker;
            mapLayers.push(marker);
            map.flyTo(entry.coord, 14, { duration: 1 });
        }
        // 更新按钮文字
        renderCheckinList();
    }

    function renderCheckinMap() {
        // 移除旧的打卡标记
        mapLayers = mapLayers.filter(l => { if (l._isCheckin) { map.removeLayer(l); return false; } return true; });
        const filtered = getFilteredCheckins();
        filtered.forEach(item => {
            if (!item.coord) return;
            const color = CAT_COLORS[item.category] || '#3182CE';
            const icon = L.divIcon({
                className: '',
                html: `<div style="width:12px;height:12px;background:${color};border:2px solid white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.3);"></div>`,
                iconSize: [12, 12], iconAnchor: [6, 6]
            });
            const marker = L.marker(item.coord, { icon }).addTo(map).bindPopup(`<b>${item.name}</b><br>${CAT_COLORS[item.category] ? CATEGORIES[item.category].name + ' · ' : ''}${item.city}${item.address ? '<br>' + item.address : ''}`);
            marker._isCheckin = true;
            mapLayers.push(marker);
        });
        if (filtered.length > 0) {
            const coords = filtered.filter(i => i.coord).map(i => i.coord);
            if (coords.length) map.flyToBounds(L.latLngBounds(coords).pad(0.15), { duration: 1.2 });
        }
    }

    function showNavModal(lat, lng, name) {
        pendingNavCoord = [lat, lng];
        pendingNavName = name;
        document.getElementById('navTitle').textContent = `导航到「${name}」`;
        openModal('navModal');
    }

    function openNavApp(type) {
        if (!pendingNavName) return;
        const name = encodeURIComponent(pendingNavName);
        let url;
        switch(type) {
            case 'apple':
                url = `https://maps.apple.com/?daddr=${name}`;
                break;
            case 'amap':
                if (pendingNavCoord && pendingNavCoord[0] && pendingNavCoord[1]) {
                    url = `https://uri.amap.com/navigation?to=${pendingNavCoord[1]},${pendingNavCoord[0]},${name}&mode=car&callnative=1`;
                } else {
                    url = `https://m.amap.com/search/?query=${name}`;
                }
                break;
            case 'tencent':
                if (pendingNavCoord && pendingNavCoord[0] && pendingNavCoord[1]) {
                    url = `https://apis.map.qq.com/uri/v1/routeplan?to=${pendingNavCoord[1]},${pendingNavCoord[0]},${name}&type=drive`;
                } else {
                    url = `https://apis.map.qq.com/uri/v1/routeplan?to=${name}&type=drive`;
                }
                break;
            case 'baidu':
                url = `https://api.map.baidu.com/direction?destination=name:${name}&mode=driving&origin=我的位置&output=html&src=webapp`;
                break;
        }
        window.open(url, '_blank');
        closeModal('navModal');
    }

    loadFromCloud().then(() => {
        loadCheckins();
        tryGetUserLocation();
        switchView('checkin');
        // 设置统计面板初始状态
        document.getElementById('statsPanel').classList.toggle('open', statsOpen);
        document.getElementById('btnStats').classList.toggle('active', statsOpen);
        if (statsOpen) {
            setTimeout(() => {
                renderCharts();
                resizeCharts();
            }, 300);
        }

        setTimeout(() => {
            const coords = allItems.filter(i => i.coord).map(i => i.coord);
            coords.push(...allItems.filter(i => i.fromCoord).map(i => i.fromCoord));
            coords.push(...allItems.filter(i => i.toCoord).map(i => i.toCoord));
            if (coords.length) map.flyToBounds(L.latLngBounds(coords).pad(0.1), { duration: 1.5 });
        }, 500);
    });

    window.addEventListener('resize', () => { echartsInstances.forEach(c => c && c.resize()); });
    const sidebarObs = new MutationObserver(() => { setTimeout(resizeCharts, 400); });
    sidebarObs.observe(document.getElementById('sidebar'), { attributes: true, attributeFilter: ['class'] });
    </script>
